<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>Login - EcoPoints</title>
  </head>
  <body>
    <header class="cabecalho">
      <div class="container">
        <input type="checkbox" id="menu" class="container__botao" />
        <label for="menu" class="container__rotulo">
          <span class="cabecalho__menu-hamburguer container__imagem"></span>
        </label>
        <ul class="lista-menu">
          <li class="lista-menu__titulo">Páginas</li>
          <li class="lista-menu__item">
            <a href="/index.html" class="lista-menu__link">Página inicial</a>
          </li>
          <li class="lista-menu__item">
            <a href="#" class="lista-menu__link">Integrantes</a>
          </li>
          <li class="lista-menu__item">
            <a href="/pages/sobre.html" class="lista-menu__link">sobre</a>
          </li>
          <li class="lista-menu__item">
            <a href="../pages/faq.html" class="lista-menu__link">FAQ</a>
          </li>
          <li class="lista-menu__item">
            <a href="/pages/contato.html" class="lista-menu__link">Contato</a>
          </li>
        </ul>
        <h1 class="container__titulo">EcoPoints</h1>
      </div>

      <ul class="opcoes">
        <li class="opcoes__item">
          <a href="/index.html" class="lista-menu__link">Página inicial</a>
        </li>
        <li class="opcoes__item">
          <a href="#" class="opcoes__link">Integrantes</a>
        </li>
        <li class="opcoes__item">
          <a href="/pages/sobre.html" class="opcoes__link">Sobre</a>
        </li>
        <li class="opcoes__item">
          <a href="../pages/faq.html" class="lista-menu__link">FAQ</a>
        </li>
        <li class="opcoes__item">
          <a href="/pages/contato.html" class="opcoes__link">Contato</a>
        </li>
      </ul>

      <div class="container">
        <a href="#" class="container__link">
          <img
            src="../img/Usuario.svg"
            alt="Meu perfil"
            class="container__imagem"
          />
        </a>
      </div>
    </header>
    <main class="login-layout">
      <section class="login-card">
        <h2 class="login-titulo">Entrar 🌱</h2>

        <form id="loginForm">
          <input
            type="text"
            id="usuario"
            class="login-input"
            placeholder="Usuário"
            required
          />

          <input
            type="password"
            id="senha"
            class="login-input"
            placeholder="Senha"
            required
          />

          <button type="submit" class="login-botao">Entrar</button>
        </form>

        <p id="mensagem" class="login-mensagem"></p>
      </section>
    </main>
    <hr />
    <footer class="rodape">
      <p>© 2026 SoulUp - Um futuro mais sustentável</p>
    </footer>
    <script src="login.js"></script>
  </body>
</html>
